name: Release

on:
  repository_dispatch:
    types: [release]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (tag or branch)'
        required: true
      head_sha:
        description: 'Exact source commit SHA to build'
        required: true
      version:
        description: 'Version (e.g., 0.1.0 or 0.1.0-beta.1)'
        required: true
      offline:
        description: 'Build offline version'
        type: boolean
        default: false

concurrency:
  group: release-${{ github.event.client_payload.version || inputs.version }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.params.outputs.ref }}
      head_sha: ${{ steps.params.outputs.head_sha }}
      version: ${{ steps.params.outputs.version }}
      offline: ${{ steps.params.outputs.offline }}
    steps:
      - name: Get parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "ref=${{ github.event.client_payload.ref }}" >> $GITHUB_OUTPUT
            # Accept both head_sha (snake_case) and headSha (camelCase) for robustness
            RESOLVED_SHA="${{ github.event.client_payload.head_sha || github.event.client_payload.headSha }}"
            echo "head_sha=$RESOLVED_SHA" >> $GITHUB_OUTPUT
            echo "version=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
            echo "offline=${{ github.event.client_payload.offline || 'false' }}" >> $GITHUB_OUTPUT
          else
            echo "ref=${{ inputs.ref }}" >> $GITHUB_OUTPUT
            echo "head_sha=${{ inputs.head_sha }}" >> $GITHUB_OUTPUT
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "offline=${{ inputs.offline }}" >> $GITHUB_OUTPUT
          fi
          echo "::notice::version=${{ github.event_name == 'repository_dispatch' && github.event.client_payload.version || inputs.version }}"

  # ============================================
  # macOS Build + Submit Notarization
  # ============================================
  build-macos:
    needs: prepare
    runs-on: macos-14
    timeout-minutes: 360
    steps:
      - name: Checkout source (private repo)
        uses: actions/checkout@v4
        with:
          repository: daymade/flowzero
          token: ${{ secrets.FLOWZERO_REPO_TOKEN }}
          ref: ${{ needs.prepare.outputs.head_sha }}
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/Library/Caches/electron
          key: ${{ runner.os }}-arm64-electron-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-arm64-electron-

      - name: Disk diagnostics (before cleanup)
        run: |
          df -h
          du -sh "$HOME/Library/Developer/CoreSimulator" 2>/dev/null || true
          du -sh "$HOME/Library/Developer/Xcode/DerivedData" 2>/dev/null || true
          du -sh "$HOME/.cache" 2>/dev/null || true

      - name: Free macOS runner disk
        run: |
          rm -rf "$HOME/Library/Developer/Xcode/DerivedData" || true
          rm -rf "$HOME/Library/Developer/CoreSimulator/Caches" || true
          rm -rf "$HOME/Library/Developer/CoreSimulator/Devices" || true
          rm -rf "$HOME/Library/Caches/Homebrew" || true
          rm -rf "$HOME/.cache/ms-playwright" || true
          df -h

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          SKIP_INSTALL_CONFIRM: '1'

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Test
        run: pnpm test

      - name: Import Apple certificates
        if: ${{ env.HAS_CERT == 'true' }}
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CERT_P12 }}
          p12-password: ${{ secrets.MACOS_CERT_PASSWORD }}
        env:
          HAS_CERT: ${{ secrets.MACOS_CERT_P12 != '' }}

      - name: Verify signing identity
        if: ${{ env.HAS_CERT == 'true' }}
        env:
          HAS_CERT: ${{ secrets.MACOS_CERT_P12 != '' }}
        run: |
          echo "=== Keychain search list ==="
          security list-keychains -d user
          echo "=== Valid signing identities ==="
          security find-identity -v signing_temp.keychain
          echo "=== All keychains identity search ==="
          security find-identity -v

      - name: Prepare API key
        if: ${{ env.HAS_API_KEY == 'true' }}
        run: |
          echo "${{ secrets.APPLE_API_KEY }}" | base64 --decode > /tmp/AuthKey.p8
        env:
          HAS_API_KEY: ${{ secrets.APPLE_API_KEY != '' }}

      - name: Build + Sign + Package
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          FLOWZERO_OFFLINE_BUNDLE: ${{ needs.prepare.outputs.offline == 'true' && 'true' || '' }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          FLOWZERO_CODESIGN: ${{ secrets.MACOS_CERT_P12 != '' && '1' || '' }}
          FLOWZERO_NOTARIZE: ''
          APPLE_API_KEY_PATH: /tmp/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          MACOS_SIGNING_KEYCHAIN: signing_temp.keychain
          DEBUG: electron-notarize*,electron-installer-dmg
        run: |
          ulimit -n 65536
          pnpm run release:build:ci -- --mode package --version "${{ needs.prepare.outputs.version }}" --head-sha "${{ needs.prepare.outputs.head_sha }}" --arch arm64 ${{ needs.prepare.outputs.offline == 'true' && '--offline' || '' }}

      - name: Disk diagnostics (after package)
        run: |
          df -h
          du -sh apps/desktop/out 2>/dev/null || true

      - name: Submit Apple notarization
        env:
          APPLE_API_KEY_PATH: /tmp/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          pnpm run release:notarize:ci submit -- \
            --version "${{ needs.prepare.outputs.version }}" \
            --head-sha "${{ needs.prepare.outputs.head_sha }}" \
            --app-path "apps/desktop/out/Flowzero-darwin-arm64/Flowzero.app" \
            --state-file "apps/desktop/out/notarize-stage/notarization-state.json"

      - name: Collect notarization stage artifacts
        run: |
          mkdir -p apps/desktop/out/notarize-stage
          cp "apps/desktop/out/Flowzero-darwin-arm64/Flowzero.app.zip" "apps/desktop/out/notarize-stage/Flowzero.app.zip"

      - name: Upload signed app + notarization state
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-notarize-stage
          retention-days: 7
          path: |
            apps/desktop/out/notarize-stage/Flowzero.app.zip
            apps/desktop/out/notarize-stage/notarization-state.json

  # ============================================
  # Resume Notarization + Build Distributables
  # ============================================
  resume-notarize:
    needs: [prepare, build-macos]
    runs-on: macos-14
    timeout-minutes: 360
    steps:
      - name: Checkout source (private repo)
        uses: actions/checkout@v4
        with:
          repository: daymade/flowzero
          token: ${{ secrets.FLOWZERO_REPO_TOKEN }}
          ref: ${{ needs.prepare.outputs.head_sha }}
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Disk diagnostics (before resume)
        run: |
          df -h

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/Library/Caches/electron
          key: ${{ runner.os }}-arm64-electron-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-arm64-electron-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          SKIP_INSTALL_CONFIRM: '1'

      - name: Prepare API key
        run: |
          echo "${{ secrets.APPLE_API_KEY }}" | base64 --decode > /tmp/AuthKey.p8

      - name: Download signed app + notarization state
        uses: actions/download-artifact@v4
        with:
          name: release-macos-notarize-stage
          path: apps/desktop/out/notarize-stage

      - name: Restore signed app bundle
        run: |
          rm -rf "apps/desktop/out/Flowzero-darwin-arm64"
          mkdir -p "apps/desktop/out/Flowzero-darwin-arm64"
          ditto -x -k "apps/desktop/out/notarize-stage/Flowzero.app.zip" "apps/desktop/out/Flowzero-darwin-arm64"

      - name: Await Apple notarization and staple
        env:
          APPLE_API_KEY_PATH: /tmp/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          pnpm run release:notarize:ci resume -- \
            --version "${{ needs.prepare.outputs.version }}" \
            --head-sha "${{ needs.prepare.outputs.head_sha }}" \
            --app-path "apps/desktop/out/Flowzero-darwin-arm64/Flowzero.app" \
            --state-file "apps/desktop/out/notarize-stage/notarization-state.json" \
            --max-poll-attempts 600

      - name: Build distributables from notarized package
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          FLOWZERO_OFFLINE_BUNDLE: ${{ needs.prepare.outputs.offline == 'true' && 'true' || '' }}
          FLOWZERO_CODESIGN: ''
          FLOWZERO_NOTARIZE: ''
        run: |
          ulimit -n 65536
          pnpm run release:build:ci -- --mode make-from-package --version "${{ needs.prepare.outputs.version }}" --head-sha "${{ needs.prepare.outputs.head_sha }}" --arch arm64

      - name: List build outputs
        run: find apps/desktop/out/make -type f | head -50

      - name: Assert public artifact safety (macOS)
        run: bash scripts/assert-public-artifact-safety.sh --release-dir apps/desktop/out/make --platform macos

      - name: Upload macOS arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-arm64
          retention-days: 3
          path: |
            apps/desktop/out/make/**/*.dmg
            apps/desktop/out/make/**/*.zip

  # ============================================
  # Windows Build + Installer Smoke
  # ============================================
  build-windows:
    needs: prepare
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - name: Checkout source (private repo)
        uses: actions/checkout@v4
        with:
          repository: daymade/flowzero
          token: ${{ secrets.FLOWZERO_REPO_TOKEN }}
          ref: ${{ needs.prepare.outputs.head_sha }}
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          SKIP_INSTALL_CONFIRM: '1'

      - name: Ensure POSIX checksum command compatibility
        shell: bash
        run: |
          if ! command -v shasum &>/dev/null; then
            SHIM_DIR="$RUNNER_TEMP/shasum-shim"
            mkdir -p "$SHIM_DIR"
            cat > "$SHIM_DIR/shasum" << 'SHEOF'
          #!/usr/bin/env bash
          # shasum shim: delegates to sha256sum on Windows runners
          exec sha256sum "$@"
          SHEOF
            chmod +x "$SHIM_DIR/shasum"
            echo "$SHIM_DIR" >> "$GITHUB_PATH"
            echo "Created shasum shim at $SHIM_DIR/shasum"
          else
            echo "shasum already available"
          fi

      - name: Build Windows distributables
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          FLOWZERO_OFFLINE_BUNDLE: ${{ needs.prepare.outputs.offline == 'true' && 'true' || '' }}
          FLOWZERO_CODESIGN: ''
          FLOWZERO_NOTARIZE: ''
        run: |
          pnpm run release:build:ci -- --mode make --version "${{ needs.prepare.outputs.version }}" --head-sha "${{ needs.prepare.outputs.head_sha }}" --arch x64 ${{ needs.prepare.outputs.offline == 'true' && '--offline' || '' }}

      - name: Run Windows installer smoke
        run: node scripts/run-packaged-installer-smoke-windows.cjs

      - name: Assert public artifact safety (Windows)
        shell: bash
        run: bash scripts/assert-public-artifact-safety.sh --release-dir apps/desktop/out/make/squirrel.windows/x64 --platform windows

      - name: Upload Windows x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-x64
          retention-days: 3
          path: |
            apps/desktop/out/make/squirrel.windows/x64/*-Setup.exe
            apps/desktop/out/make/squirrel.windows/x64/RELEASES
            apps/desktop/out/make/squirrel.windows/x64/*.nupkg

  # ============================================
  # Create Release
  # ============================================
  release:
    needs: [prepare, resume-notarize, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List all artifacts
        run: find artifacts -type f | sort

      - name: Determine release type
        id: release_type
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          if [[ "$VERSION" == *"-beta"* ]] || [[ "$VERSION" == *"-alpha"* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: Flowzero v${{ needs.prepare.outputs.version }}
          draft: true
          prerelease: ${{ steps.release_type.outputs.prerelease }}
          body: |
            ## Flowzero v${{ needs.prepare.outputs.version }}

            ### Downloads

            | Platform | Architecture | File |
            |----------|--------------|------|
            | macOS | Apple Silicon (arm64) | `Flowzero-*-arm64.dmg` |
            | Windows | x64 | `Flowzero-*-Setup.exe` |

            ### Auto-Update

            - **Stable**: `https://updates.flowzero.app`
            - **Beta**: `https://updates-beta.flowzero.app`
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*-Setup.exe
            artifacts/**/RELEASES
            artifacts/**/*.nupkg

      - name: Verify Squirrel RELEASES references uploaded nupkg
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v${{ needs.prepare.outputs.version }}
        run: |
          ASSET_NAMES="$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')"
          NUPKG_NAME="$(echo "$ASSET_NAMES" | grep '\.nupkg$' | head -1)"
          if [ -z "$NUPKG_NAME" ]; then
            echo "::error::No nupkg found in release assets"
            exit 1
          fi
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --pattern "RELEASES" --dir /tmp/verify-releases
          if ! grep -q "$NUPKG_NAME" /tmp/verify-releases/RELEASES; then
            echo "::error::RELEASES file does not reference $NUPKG_NAME"
            cat /tmp/verify-releases/RELEASES
            exit 1
          fi
          echo "RELEASES file correctly references $NUPKG_NAME"

      - name: Delete artifacts after release
        uses: geekyeggo/delete-artifact@v5
        with:
          name: release-macos-arm64
      - name: Delete Windows artifacts after release
        uses: geekyeggo/delete-artifact@v5
        with:
          name: release-windows-x64
      - name: Delete notarization stage artifacts after release
        uses: geekyeggo/delete-artifact@v5
        with:
          name: release-macos-notarize-stage

  # ============================================
  # Tier 2 Verification — macOS (cryptographic)
  # ============================================
  verify-published-macos:
    needs: [prepare, release]
    runs-on: macos-14
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Download published DMG
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v${{ needs.prepare.outputs.version }}
        run: |
          mkdir -p /tmp/verify-macos
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --pattern "*.dmg" --dir /tmp/verify-macos
          DMG_FILE="$(ls /tmp/verify-macos/*.dmg | head -1)"
          echo "DMG_FILE=$DMG_FILE" >> "$GITHUB_ENV"
          echo "Downloaded: $DMG_FILE"

      - name: Verify notarization staple on DMG
        run: xcrun stapler validate "$DMG_FILE"

      - name: Mount DMG and verify code signature
        run: |
          MOUNT_POINT="/tmp/flowzero-dmg-mount"
          hdiutil attach "$DMG_FILE" -mountpoint "$MOUNT_POINT" -nobrowse -noverify

          APP_PATH="$(find "$MOUNT_POINT" -maxdepth 1 -name '*.app' | head -1)"
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app found in DMG"
            hdiutil detach "$MOUNT_POINT" -force || true
            exit 1
          fi
          echo "MOUNT_POINT=$MOUNT_POINT" >> "$GITHUB_ENV"

          echo "=== Deep code signature verification ==="
          codesign --verify --deep --strict "$APP_PATH"

          echo "=== Certificate identity ==="
          codesign -dvv "$APP_PATH" 2>&1 | grep -E "Authority|TeamIdentifier|Runtime"

          echo "=== Gatekeeper assessment ==="
          spctl --assess --type execute --verbose=2 "$APP_PATH" 2>&1 || true

          echo "=== App notarization staple ==="
          xcrun stapler validate "$APP_PATH"

          echo "macOS Tier 2 verification passed"

      - name: Cleanup
        if: always()
        run: |
          hdiutil detach "${MOUNT_POINT:-/tmp/flowzero-dmg-mount}" -force 2>/dev/null || true
          rm -rf /tmp/verify-macos /tmp/flowzero-dmg-mount

  # ============================================
  # Tier 2 Verification — Windows (installer smoke)
  # ============================================
  verify-published-windows:
    needs: [prepare, release]
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout source (for smoke test script)
        uses: actions/checkout@v4
        with:
          repository: daymade/flowzero
          token: ${{ secrets.FLOWZERO_REPO_TOKEN }}
          ref: ${{ needs.prepare.outputs.head_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies (for smoke script)
        run: pnpm install --frozen-lockfile
        env:
          SKIP_INSTALL_CONFIRM: '1'

      - name: Download published Windows assets
        env:
          GH_TOKEN: ${{ secrets.FLOWZERO_REPO_TOKEN }}
          RELEASE_TAG: v${{ needs.prepare.outputs.version }}
        shell: bash
        run: |
          VERIFY_DIR="$RUNNER_TEMP/verify-windows"
          mkdir -p "$VERIFY_DIR"
          gh release download "$RELEASE_TAG" --repo daymade/flowzero-releases --pattern "*-Setup.exe" --dir "$VERIFY_DIR"
          gh release download "$RELEASE_TAG" --repo daymade/flowzero-releases --pattern "RELEASES" --dir "$VERIFY_DIR"
          gh release download "$RELEASE_TAG" --repo daymade/flowzero-releases --pattern "*.nupkg" --dir "$VERIFY_DIR"
          echo "VERIFY_DIR=$VERIFY_DIR" >> "$GITHUB_ENV"
          ls -la "$VERIFY_DIR"

      - name: Run installer smoke test on published assets
        env:
          FLOWZERO_WINDOWS_INSTALLER_SMOKE_ONLY: '1'
        run: node scripts/run-packaged-installer-smoke-windows.cjs --release-dir "${{ env.VERIFY_DIR }}"

  # ============================================
  # Publish (convert draft → live)
  # ============================================
  publish-release:
    needs: [prepare, verify-published-macos, verify-published-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release (draft to live)
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v${{ needs.prepare.outputs.version }}
        run: |
          RELEASE_ID="$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json databaseId --jq '.databaseId')"
          gh api --method PATCH "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" -F draft=false > /dev/null
          echo "Published release $RELEASE_TAG (draft to live)"
