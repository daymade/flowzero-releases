name: Release

on:
  repository_dispatch:
    types: [release]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (tag or branch)'
        required: true
      head_sha:
        description: 'Exact source commit SHA to build'
        required: true
      version:
        description: 'Version (e.g., 0.1.0 or 0.1.0-beta.1)'
        required: true
      offline:
        description: 'Build offline version'
        type: boolean
        default: false

concurrency:
  group: release-${{ github.event.client_payload.version || inputs.version }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.params.outputs.ref }}
      head_sha: ${{ steps.params.outputs.head_sha }}
      version: ${{ steps.params.outputs.version }}
      offline: ${{ steps.params.outputs.offline }}
    steps:
      - name: Get parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "ref=${{ github.event.client_payload.ref }}" >> $GITHUB_OUTPUT
            # Accept both head_sha (snake_case) and headSha (camelCase) for robustness
            RESOLVED_SHA="${{ github.event.client_payload.head_sha || github.event.client_payload.headSha }}"
            echo "head_sha=$RESOLVED_SHA" >> $GITHUB_OUTPUT
            echo "version=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
            echo "offline=${{ github.event.client_payload.offline || 'false' }}" >> $GITHUB_OUTPUT
          else
            echo "ref=${{ inputs.ref }}" >> $GITHUB_OUTPUT
            echo "head_sha=${{ inputs.head_sha }}" >> $GITHUB_OUTPUT
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "offline=${{ inputs.offline }}" >> $GITHUB_OUTPUT
          fi
          echo "::notice::version=${{ github.event_name == 'repository_dispatch' && github.event.client_payload.version || inputs.version }}"

  # ============================================
  # macOS Build + Submit Signed DMG
  # ============================================
  build-macos:
    needs: prepare
    runs-on: macos-14
    timeout-minutes: 360
    steps:
      - name: Checkout source (private repo)
        uses: actions/checkout@v4
        with:
          repository: daymade/flowzero
          token: ${{ secrets.FLOWZERO_REPO_TOKEN }}
          ref: ${{ needs.prepare.outputs.head_sha }}
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: '0.11.28'

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/Library/Caches/electron
          key: ${{ runner.os }}-arm64-electron-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-arm64-electron-

      - name: Disk diagnostics (before cleanup)
        run: |
          df -h
          du -sh "$HOME/Library/Developer/CoreSimulator" 2>/dev/null || true
          du -sh "$HOME/Library/Developer/Xcode/DerivedData" 2>/dev/null || true
          du -sh "$HOME/.cache" 2>/dev/null || true

      - name: Free macOS runner disk
        run: |
          rm -rf "$HOME/Library/Developer/Xcode/DerivedData" || true
          rm -rf "$HOME/Library/Developer/CoreSimulator/Caches" || true
          rm -rf "$HOME/Library/Developer/CoreSimulator/Devices" || true
          rm -rf "$HOME/Library/Caches/Homebrew" || true
          rm -rf "$HOME/.cache/ms-playwright" || true
          df -h

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          SKIP_INSTALL_CONFIRM: '1'

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Test
        run: pnpm test

      - name: Import Apple certificates
        if: ${{ env.HAS_CERT == 'true' }}
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CERT_P12 }}
          p12-password: ${{ secrets.MACOS_CERT_PASSWORD }}
        env:
          HAS_CERT: ${{ secrets.MACOS_CERT_P12 != '' }}

      - name: Verify signing identity
        if: ${{ env.HAS_CERT == 'true' }}
        env:
          HAS_CERT: ${{ secrets.MACOS_CERT_P12 != '' }}
        run: |
          echo "=== Keychain search list ==="
          security list-keychains -d user
          echo "=== Valid signing identities ==="
          security find-identity -v signing_temp.keychain
          echo "=== All keychains identity search ==="
          security find-identity -v

      - name: Prepare API key
        if: ${{ env.HAS_API_KEY == 'true' }}
        run: |
          echo "${{ secrets.APPLE_API_KEY }}" | base64 --decode > /tmp/AuthKey.p8
        env:
          HAS_API_KEY: ${{ secrets.APPLE_API_KEY != '' }}

      - name: Build + Sign Distributables
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          FLOWZERO_OFFLINE_BUNDLE: ${{ needs.prepare.outputs.offline == 'true' && 'true' || '' }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          FLOWZERO_CODESIGN: ${{ secrets.MACOS_CERT_P12 != '' && '1' || '' }}
          FLOWZERO_NOTARIZE: ''
          APPLE_API_KEY_PATH: /tmp/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          MACOS_SIGNING_KEYCHAIN: signing_temp.keychain
          DEBUG: electron-notarize*,electron-installer-dmg
        run: |
          ulimit -n 65536
          pnpm run release:build:ci -- --mode make --version "${{ needs.prepare.outputs.version }}" --head-sha "${{ needs.prepare.outputs.head_sha }}" --arch arm64 ${{ needs.prepare.outputs.offline == 'true' && '--offline' || '' }}

      - name: Disk diagnostics (after package)
        run: |
          df -h
          du -sh apps/desktop/out 2>/dev/null || true

      - name: Submit Apple notarization
        env:
          APPLE_API_KEY_PATH: /tmp/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          pnpm run release:notarize:ci submit -- \
            --version "${{ needs.prepare.outputs.version }}" \
            --head-sha "${{ needs.prepare.outputs.head_sha }}" \
            --app-path "apps/desktop/out/Flowzero-darwin-arm64/Flowzero.app" \
            --submission-path "apps/desktop/out/make/Flowzero-${{ needs.prepare.outputs.version }}-arm64.dmg" \
            --state-file "apps/desktop/out/notarize-stage/notarization-state.json"

      - name: Collect notarization stage artifacts
        run: |
          mkdir -p apps/desktop/out/notarize-stage
          cp \
            "apps/desktop/out/make/Flowzero-${{ needs.prepare.outputs.version }}-arm64.dmg" \
            "apps/desktop/out/notarize-stage/Flowzero-${{ needs.prepare.outputs.version }}-arm64.dmg"

      - name: Upload signed DMG + notarization state
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-notarize-stage
          retention-days: 7
          path: |
            apps/desktop/out/notarize-stage/Flowzero-${{ needs.prepare.outputs.version }}-arm64.dmg
            apps/desktop/out/notarize-stage/notarization-state.json

  # ============================================
  # Resume Notarization + Staple Submitted DMG + Rebuild ZIP
  # ============================================
  resume-notarize:
    needs: [prepare, build-macos]
    runs-on: macos-14
    timeout-minutes: 360
    steps:
      - name: Checkout source (private repo)
        uses: actions/checkout@v4
        with:
          repository: daymade/flowzero
          token: ${{ secrets.FLOWZERO_REPO_TOKEN }}
          ref: ${{ needs.prepare.outputs.head_sha }}
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Disk diagnostics (before resume)
        run: |
          df -h

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/Library/Caches/electron
          key: ${{ runner.os }}-arm64-electron-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-arm64-electron-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          SKIP_INSTALL_CONFIRM: '1'

      - name: Prepare API key
        run: |
          echo "${{ secrets.APPLE_API_KEY }}" | base64 --decode > /tmp/AuthKey.p8

      - name: Download signed DMG + notarization state
        uses: actions/download-artifact@v4
        with:
          name: release-macos-notarize-stage
          path: apps/desktop/out/notarize-stage

      - name: Restore submitted DMG and app bundle
        run: |
          DMG_PATH="apps/desktop/out/make/Flowzero-${{ needs.prepare.outputs.version }}-arm64.dmg"
          MOUNT_POINT="$RUNNER_TEMP/flowzero-notarize-source"
          mkdir -p "$(dirname "$DMG_PATH")" "$MOUNT_POINT"
          cp \
            "apps/desktop/out/notarize-stage/Flowzero-${{ needs.prepare.outputs.version }}-arm64.dmg" \
            "$DMG_PATH"
          hdiutil attach "$DMG_PATH" -mountpoint "$MOUNT_POINT" -nobrowse -readonly
          trap 'hdiutil detach "$MOUNT_POINT" -force 2>/dev/null || true' EXIT
          rm -rf "apps/desktop/out/Flowzero-darwin-arm64"
          mkdir -p "apps/desktop/out/Flowzero-darwin-arm64"
          ditto \
            "$MOUNT_POINT/Flowzero.app" \
            "apps/desktop/out/Flowzero-darwin-arm64/Flowzero.app"
          hdiutil detach "$MOUNT_POINT"
          trap - EXIT

      - name: Await Apple notarization and staple
        env:
          APPLE_API_KEY_PATH: /tmp/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          pnpm run release:notarize:ci resume -- \
            --version "${{ needs.prepare.outputs.version }}" \
            --head-sha "${{ needs.prepare.outputs.head_sha }}" \
            --app-path "apps/desktop/out/Flowzero-darwin-arm64/Flowzero.app" \
            --submission-path "apps/desktop/out/make/Flowzero-${{ needs.prepare.outputs.version }}-arm64.dmg" \
            --state-file "apps/desktop/out/notarize-stage/notarization-state.json" \
            --max-poll-attempts 600

      - name: Preserve stapled DMG outside Forge output
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          DMG_PATH="apps/desktop/out/make/Flowzero-${RELEASE_VERSION}-arm64.dmg"
          PRESERVED_DMG="$RUNNER_TEMP/Flowzero-${RELEASE_VERSION}-arm64.stapled.dmg"
          cp "$DMG_PATH" "$PRESERVED_DMG"
          STAPLED_DMG_SHA256="$(shasum -a 256 "$PRESERVED_DMG" | awk '{print $1}')"
          echo "PRESERVED_DMG=$PRESERVED_DMG" >> "$GITHUB_ENV"
          echo "STAPLED_DMG_SHA256=$STAPLED_DMG_SHA256" >> "$GITHUB_ENV"

      - name: Rebuild ZIP from stapled app
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          FLOWZERO_OFFLINE_BUNDLE: ${{ needs.prepare.outputs.offline == 'true' && 'true' || '' }}
          FLOWZERO_CODESIGN: ''
          FLOWZERO_NOTARIZE: ''
        run: |
          ulimit -n 65536
          pnpm run release:build:ci -- --mode make-from-package --targets @electron-forge/maker-zip --version "${{ needs.prepare.outputs.version }}" --head-sha "${{ needs.prepare.outputs.head_sha }}" --arch arm64

      - name: Restore and verify submitted DMG
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          DMG_PATH="apps/desktop/out/make/Flowzero-${RELEASE_VERSION}-arm64.dmg"
          mkdir -p "$(dirname "$DMG_PATH")"
          cp "$PRESERVED_DMG" "$DMG_PATH"
          ACTUAL_DMG_SHA256="$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')"
          test "$ACTUAL_DMG_SHA256" = "$STAPLED_DMG_SHA256"
          hdiutil verify "$DMG_PATH"
          codesign --verify --strict --verbose=2 "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"
          spctl --assess --type open --context context:primary-signature --verbose=2 "$DMG_PATH"

      - name: List build outputs
        run: find apps/desktop/out/make -type f | head -50

      - name: Assert public artifact safety (macOS)
        run: bash scripts/assert-public-artifact-safety.sh --release-dir apps/desktop/out/make --platform macos

      - name: Upload macOS arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-arm64
          retention-days: 3
          path: |
            apps/desktop/out/make/**/*.dmg
            apps/desktop/out/make/**/*.zip

  # ============================================
  # Windows Build + Installer Smoke
  # ============================================
  build-windows:
    needs: prepare
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - name: Checkout source (private repo)
        uses: actions/checkout@v4
        with:
          repository: daymade/flowzero
          token: ${{ secrets.FLOWZERO_REPO_TOKEN }}
          ref: ${{ needs.prepare.outputs.head_sha }}
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          SKIP_INSTALL_CONFIRM: '1'

      - name: Ensure POSIX checksum command compatibility
        shell: bash
        run: |
          if ! command -v shasum &>/dev/null; then
            SHIM_DIR="$RUNNER_TEMP/shasum-shim"
            mkdir -p "$SHIM_DIR"
            cat > "$SHIM_DIR/shasum" << 'SHEOF'
          #!/usr/bin/env bash
          # shasum shim: delegates to sha256sum on Windows runners
          exec sha256sum "$@"
          SHEOF
            chmod +x "$SHIM_DIR/shasum"
            echo "$SHIM_DIR" >> "$GITHUB_PATH"
            echo "Created shasum shim at $SHIM_DIR/shasum"
          else
            echo "shasum already available"
          fi

      - name: Build Windows distributables
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          FLOWZERO_OFFLINE_BUNDLE: ${{ needs.prepare.outputs.offline == 'true' && 'true' || '' }}
          FLOWZERO_CODESIGN: ''
          FLOWZERO_NOTARIZE: ''
        run: |
          pnpm run release:build:ci -- --mode make --version "${{ needs.prepare.outputs.version }}" --head-sha "${{ needs.prepare.outputs.head_sha }}" --arch x64 ${{ needs.prepare.outputs.offline == 'true' && '--offline' || '' }}

      - name: Run Windows installer smoke
        run: node scripts/run-packaged-installer-smoke-windows.cjs

      - name: Assert public artifact safety (Windows)
        shell: bash
        run: bash scripts/assert-public-artifact-safety.sh --release-dir apps/desktop/out/make/squirrel.windows/x64 --platform windows

      - name: Upload Windows x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-x64
          retention-days: 3
          path: |
            apps/desktop/out/make/squirrel.windows/x64/*-Setup.exe
            apps/desktop/out/make/squirrel.windows/x64/RELEASES
            apps/desktop/out/make/squirrel.windows/x64/*.nupkg

  # ============================================
  # Create Release
  # ============================================
  release:
    needs: [prepare, resume-notarize, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout release infrastructure
        uses: actions/checkout@v4

      # Stage 1 intentionally retains an unstapled DMG with the same basename as
      # the final DMG. Only final artifacts may enter the release upload tree.
      - name: Download final macOS release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-macos-arm64
          path: artifacts/release-macos-arm64

      - name: Download final Windows release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-windows-x64
          path: artifacts/release-windows-x64

      - name: Generate macOS updater integrity metadata
        run: |
          node --test .github/scripts/generate-macos-update-integrity.test.mjs
          node .github/scripts/generate-macos-update-integrity.mjs \
            --asset-root artifacts/release-macos-arm64 \
            --version "${{ needs.prepare.outputs.version }}" \
            --output artifacts/release-metadata/mac-update-integrity.json

      - name: Validate final release artifact manifest
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          DMG_FILES=(artifacts/release-macos-arm64/*.dmg)
          ZIP_FILES=(artifacts/release-macos-arm64/zip/darwin/arm64/*.zip)
          SETUP_FILES=(artifacts/release-windows-x64/*-Setup.exe)
          NUPKG_FILES=(artifacts/release-windows-x64/*.nupkg)
          INTEGRITY_FILES=(artifacts/release-metadata/mac-update-integrity.json)

          if [[ ${#DMG_FILES[@]} -ne 1 || ${#ZIP_FILES[@]} -ne 1 || ${#SETUP_FILES[@]} -ne 1 || ${#NUPKG_FILES[@]} -ne 1 || ${#INTEGRITY_FILES[@]} -ne 1 || ! -f artifacts/release-windows-x64/RELEASES ]]; then
            echo "::error::Final release artifact manifest is incomplete or ambiguous"
            find artifacts -type f | sort
            exit 1
          fi

          mapfile -t ALL_FILES < <(find artifacts -type f | sort)
          EXPECTED_FILES=(
            "${DMG_FILES[@]}"
            "${ZIP_FILES[@]}"
            "${SETUP_FILES[@]}"
            "${NUPKG_FILES[@]}"
            "${INTEGRITY_FILES[@]}"
            artifacts/release-windows-x64/RELEASES
          )
          UNEXPECTED_FILES="$(comm -13 \
            <(printf '%s\n' "${EXPECTED_FILES[@]}" | sort) \
            <(printf '%s\n' "${ALL_FILES[@]}" | sort))"
          if [[ -n "$UNEXPECTED_FILES" ]]; then
            echo "::error::Unexpected file found in final release artifact manifest"
            echo "$UNEXPECTED_FILES"
            exit 1
          fi

          DUPLICATE_BASENAMES="$({
            while IFS= read -r FILE; do
              basename "$FILE"
            done < <(find artifacts -type f)
          } | sort | uniq -d)"
          if [[ -n "$DUPLICATE_BASENAMES" ]]; then
            echo "::error::Duplicate release asset basenames are forbidden"
            echo "$DUPLICATE_BASENAMES"
            exit 1
          fi

      - name: List final release artifacts
        run: find artifacts -type f | sort

      - name: Determine release type
        id: release_type
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          if [[ "$VERSION" == *"-beta"* ]] || [[ "$VERSION" == *"-alpha"* ]]; then
            {
              echo "prerelease=true"
              echo "download_base=https://updates-beta.flowzero.app"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "prerelease=false"
              echo "download_base=https://updates.flowzero.app"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Mirror and verify final release assets
        uses: ./.github/actions/mirror-release-assets
        with:
          asset-root: artifacts
          release-tag: v${{ needs.prepare.outputs.version }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: flowzero-releases
          R2_PUBLIC_BASE_URL: https://downloads.flowzero.app
          ALIYUN_OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
          ALIYUN_OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
          ALIYUN_OSS_ENDPOINT: oss-cn-beijing.aliyuncs.com
          ALIYUN_OSS_REGION: cn-beijing
          ALIYUN_OSS_BUCKET: flowzero-releases-cn
          ALIYUN_OSS_PUBLIC_BASE_URL: https://flowzero-releases-cn.oss-cn-beijing.aliyuncs.com

      - name: Create Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: Flowzero v${{ needs.prepare.outputs.version }}
          draft: true
          prerelease: ${{ steps.release_type.outputs.prerelease }}
          body: |
            ## Flowzero v${{ needs.prepare.outputs.version }}

            ### Downloads

            | Platform | Architecture | File |
            |----------|--------------|------|
            | macOS | Apple Silicon (arm64) | [Download DMG](${{ steps.release_type.outputs.download_base }}/download/mac_arm64) |
            | Windows | x64 | [Download installer](${{ steps.release_type.outputs.download_base }}/download/windows) |

            ### Auto-Update

            - **Stable**: `https://updates.flowzero.app`
            - **Beta**: `https://updates-beta.flowzero.app`
          files: |
            artifacts/release-macos-arm64/*.dmg
            artifacts/release-macos-arm64/**/*.zip
            artifacts/release-windows-x64/*-Setup.exe
            artifacts/release-windows-x64/RELEASES
            artifacts/release-windows-x64/*.nupkg
            artifacts/release-metadata/mac-update-integrity.json

      - name: Verify Squirrel RELEASES references uploaded nupkg
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v${{ needs.prepare.outputs.version }}
        run: |
          ASSET_NAMES="$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')"
          NUPKG_NAME="$(echo "$ASSET_NAMES" | grep '\.nupkg$' | head -1)"
          if [ -z "$NUPKG_NAME" ]; then
            echo "::error::No nupkg found in release assets"
            exit 1
          fi
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --pattern "RELEASES" --dir /tmp/verify-releases
          if ! grep -q "$NUPKG_NAME" /tmp/verify-releases/RELEASES; then
            echo "::error::RELEASES file does not reference $NUPKG_NAME"
            cat /tmp/verify-releases/RELEASES
            exit 1
          fi
          echo "RELEASES file correctly references $NUPKG_NAME"

      - name: Delete artifacts after release
        uses: geekyeggo/delete-artifact@v5
        with:
          name: release-macos-arm64
      - name: Delete Windows artifacts after release
        uses: geekyeggo/delete-artifact@v5
        with:
          name: release-windows-x64
      - name: Delete notarization stage artifacts after release
        uses: geekyeggo/delete-artifact@v5
        with:
          name: release-macos-notarize-stage

  # ============================================
  # Tier 2 Verification — macOS (cryptographic)
  # ============================================
  verify-published-macos:
    needs: [prepare, release]
    runs-on: macos-14
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Download published macOS assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v${{ needs.prepare.outputs.version }}
        run: |
          mkdir -p /tmp/verify-macos
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --pattern "*.dmg" --dir /tmp/verify-macos
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --pattern "*.zip" --dir /tmp/verify-macos

          shopt -s nullglob
          DMG_FILES=(/tmp/verify-macos/*.dmg)
          ZIP_FILES=(/tmp/verify-macos/*.zip)
          if [ "${#DMG_FILES[@]}" -ne 1 ] || [ "${#ZIP_FILES[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one published DMG and one published ZIP"
            find /tmp/verify-macos -maxdepth 1 -type f -print
            exit 1
          fi

          DMG_FILE="${DMG_FILES[0]}"
          ZIP_FILE="${ZIP_FILES[0]}"
          echo "DMG_FILE=$DMG_FILE" >> "$GITHUB_ENV"
          echo "ZIP_FILE=$ZIP_FILE" >> "$GITHUB_ENV"
          echo "Downloaded DMG: $DMG_FILE"
          echo "Downloaded ZIP: $ZIP_FILE"

      - name: Verify signed and notarized DMG
        run: |
          hdiutil verify "$DMG_FILE"
          codesign --verify --strict --verbose=2 "$DMG_FILE"
          xcrun stapler validate "$DMG_FILE"
          spctl --assess --type open --context context:primary-signature --verbose=2 "$DMG_FILE"

      - name: Mount DMG and verify contained app
        run: |
          MOUNT_POINT="/tmp/flowzero-dmg-mount"
          hdiutil attach "$DMG_FILE" -mountpoint "$MOUNT_POINT" -nobrowse -noverify

          APP_PATH="$(find "$MOUNT_POINT" -maxdepth 1 -name '*.app' | head -1)"
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app found in DMG"
            hdiutil detach "$MOUNT_POINT" -force || true
            exit 1
          fi
          echo "MOUNT_POINT=$MOUNT_POINT" >> "$GITHUB_ENV"

          echo "=== Deep code signature verification ==="
          codesign --verify --deep --strict "$APP_PATH"

          echo "=== Certificate identity ==="
          codesign -dvv "$APP_PATH" 2>&1 | grep -E "Authority|TeamIdentifier|Runtime"

          echo "=== Gatekeeper assessment ==="
          spctl --assess --type execute --verbose=2 "$APP_PATH"

          # Apple notarization covers the outermost distribution container.
          # The DMG ticket covers its contained app; app-level stapling is
          # required for the separately distributed ZIP and is checked below.

          echo "Published DMG verification passed"

      - name: Extract ZIP and verify updater app ticket
        run: |
          ZIP_DIR="/tmp/flowzero-zip-extract"
          mkdir -p "$ZIP_DIR"
          ditto -x -k "$ZIP_FILE" "$ZIP_DIR"

          APP_PATH="$(find "$ZIP_DIR" -maxdepth 2 -type d -name '*.app' -print -quit)"
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app found in published ZIP"
            exit 1
          fi

          echo "=== Updater app deep code signature verification ==="
          codesign --verify --deep --strict "$APP_PATH"

          echo "=== Updater app Gatekeeper assessment ==="
          spctl --assess --type execute --verbose=2 "$APP_PATH"

          echo "=== Updater app notarization staple ==="
          xcrun stapler validate "$APP_PATH"

          echo "Published ZIP verification passed"

      - name: Cleanup
        if: always()
        run: |
          hdiutil detach "${MOUNT_POINT:-/tmp/flowzero-dmg-mount}" -force 2>/dev/null || true
          rm -rf /tmp/verify-macos /tmp/flowzero-dmg-mount /tmp/flowzero-zip-extract

  # ============================================
  # Tier 2 Verification — Windows (installer smoke)
  # ============================================
  verify-published-windows:
    needs: [prepare, release]
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout source (for smoke test script)
        uses: actions/checkout@v4
        with:
          repository: daymade/flowzero
          token: ${{ secrets.FLOWZERO_REPO_TOKEN }}
          ref: ${{ needs.prepare.outputs.head_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies (for smoke script)
        run: pnpm install --frozen-lockfile
        env:
          SKIP_INSTALL_CONFIRM: '1'

      - name: Download published Windows assets
        env:
          GH_TOKEN: ${{ secrets.FLOWZERO_REPO_TOKEN }}
          RELEASE_TAG: v${{ needs.prepare.outputs.version }}
        shell: bash
        run: |
          VERIFY_DIR="$RUNNER_TEMP/verify-windows"
          mkdir -p "$VERIFY_DIR"
          gh release download "$RELEASE_TAG" --repo daymade/flowzero-releases --pattern "*-Setup.exe" --dir "$VERIFY_DIR"
          gh release download "$RELEASE_TAG" --repo daymade/flowzero-releases --pattern "RELEASES" --dir "$VERIFY_DIR"
          gh release download "$RELEASE_TAG" --repo daymade/flowzero-releases --pattern "*.nupkg" --dir "$VERIFY_DIR"
          echo "VERIFY_DIR=$VERIFY_DIR" >> "$GITHUB_ENV"
          ls -la "$VERIFY_DIR"

      - name: Run installer smoke test on published assets
        env:
          FLOWZERO_WINDOWS_INSTALLER_SMOKE_ONLY: '1'
        run: node scripts/run-packaged-installer-smoke-windows.cjs --release-dir "${{ env.VERIFY_DIR }}"

  # ============================================
  # Publish (convert draft → live)
  # ============================================
  publish-release:
    needs: [prepare, verify-published-macos, verify-published-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release (draft to live)
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v${{ needs.prepare.outputs.version }}
        run: |
          RELEASE_ID="$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json databaseId --jq '.databaseId')"
          gh api --method PATCH "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" -F draft=false > /dev/null
          echo "Published release $RELEASE_TAG (draft to live)"
