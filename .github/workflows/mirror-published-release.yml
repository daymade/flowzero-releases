name: Mirror Published Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to mirror (for example v0.1.2-beta.5)'
        required: true

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout release infrastructure
        uses: actions/checkout@v4

      - name: Download the published release manifest
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/published-release
          gh release download \
            "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --dir artifacts/published-release

      - name: Mirror and verify published assets
        uses: ./.github/actions/mirror-release-assets
        with:
          asset-root: artifacts/published-release
          release-tag: ${{ inputs.tag }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: flowzero-releases
          R2_PUBLIC_BASE_URL: https://downloads.flowzero.app
          ALIYUN_OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
          ALIYUN_OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
          ALIYUN_OSS_ENDPOINT: oss-cn-beijing.aliyuncs.com
          ALIYUN_OSS_REGION: cn-beijing
          ALIYUN_OSS_BUCKET: flowzero-releases-cn
          ALIYUN_OSS_PUBLIC_BASE_URL: https://flowzero-releases-cn.oss-cn-beijing.aliyuncs.com
